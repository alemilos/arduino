; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
build_flags = -Isrc

[env:wokwi]
platform  = espressif32
board     = esp32dev
framework = arduino
build_flags =
    ${common.build_flags}
    -DTARGET_BOARD=BOARD_WOKWI
lib_deps =
    adafruit/Adafruit ILI9341@^1.6.3
    adafruit/Adafruit GFX Library@^1.12.5

[env:esp32]
platform  = espressif32
board     = esp32dev
framework = arduino
build_flags =
    ${common.build_flags}
    -DTARGET_BOARD=BOARD_ESP32
    -DUSER_SETUP_LOADED
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=480
    -DTFT_HEIGHT=320
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTOUCH_CS=-1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
lib_deps =
    bodmer/TFT_eSPI@^2.5.43

[env:uno]
platform  = atmelavr
board     = uno
framework = arduino
build_flags =
    ${common.build_flags}
    -DTARGET_BOARD=BOARD_UNO
lib_deps =
    adafruit/Adafruit ILI9341@^1.6.3
    adafruit/Adafruit GFX Library@^1.12.5