[env:esp32]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    ${common.build_flags}
    -DTARGET_BOARD=BOARD_ESP32
    -DUSER_SETUP_LOADED
    -DILI9488_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DLOAD_GLCD=1               ; Carica i font standard
    -DTOUCH_CS=-1
    ; -DSPI_FREQUENCY=40000000
    -DSPI_FREQUENCY=27000000    ; Velocità stabile per ILI9488 su breadboard
    -DSPI_READ_FREQUENCY=20000000
lib_deps =
    bodmer/TFT_eSPI@^2.5.43

[env:uno]
platform  = atmelavr
board     = uno
framework = arduino
build_flags =
    ${common.build_flags}
    -DTARGET_BOARD=BOARD_UNO
lib_deps =
    adafruit/Adafruit ILI9341@^1.6.3
    adafruit/Adafruit GFX Library@^1.12.5